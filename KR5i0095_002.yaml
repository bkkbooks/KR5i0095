body:
  text: 十戒功過格十戒功過格序身口有一定之是非意念無一定之善惡以有定者定無定者則有定者亦歸於無定以無定者定有定者則無定者亦歸於有定是則意念可以該身口而身口必不能該意念也陽律多論迹所以甚疏陰律惟論心所以甚密但知治身口之惡而不知治意念之惡逐末忘本陽雖為君子而陰實為小人譬之瓶花香色皆備而根本實無何由結果哉故求福報者必修實行欲修實行者必起實心欲起實心者必袪妄念而欲起實心袪妄念必考核於陰律知陰律之重輕然後知立心之誠偽知立心之誠偽然後知功行之虛實知功行之虛實然後知福報之有憑無憑嗚呼陰律之傳世人茫昧往往引罪為功指輕為重卒至所求不遂反疑天道之果無知也亦大可哀矣夫所謂陰律者合三為一以定果報者也三者何身業語業意業是也一者何心是也合身口意之善惡而以一心之誠偽為之權衡事有千條例成萬變固不可以輕言然而輕重較量要不外於三等九則而已析而言之東嶽掌鐵律以治鬼鬼業惟惡惡業之中例分三等以定三途而每途之中又分三等每等之中復分九則九而九之共有八十一差等上清掌玉律以治仙仙業惟善善業之中亦分三等以定三界而每界之中又分三等每等之中復分九則九而九之亦有八十一差等雷府掌金律以治人人之業善惡相參善惡之中各分九則九與九對較復定九則以成九果九果者貴賤富貧壽夭多男孤獨平等是也九果之中各有九錯復有九差差與錯之九九相因單復輾轉萬變不齊矣統而言之上等天道下等鬼道中等人道三等之外別無他歧總以一心之善惡為之升降為之分別此陰律之大概也黃暢膴因余降乩有人世又豈能容得十惡一語隨作福報懺法痛悔十惡之非心增修十善之正行懺法既已行世復與吳海若輯録十戒過功格式以為持行之準例分三等九則列有九十三門條開千有餘款法綦密矣余嘉其志且喜其規模大有合於陰律也余復降乩為之定其陰律之重輕補其條例之缺漏使與鐵律金律玉律同條共貫略無毫忽之差焉書成顏之曰行核謂是一切人鬼仙凡之行皆可於兹考核也持行之法必先對佛求哀懺悔宿業然後依律增修一切善行脫有過誤以功折除餘善積纍自一而十自十而百自百而千千功既立可為下等善果從前種種罪障俱可消除更得精進自千而萬萬功成就可為中等善果富貴福壽等報俱可希冀若復不倦精進有加自萬而億必得生天更能皈依三寶念佛參禪緣覺聲聞菩薩諸乘皆得成就嗟哉懋哉嗟哉欽哉陰律者天律也上天之所寶也一旦泄於人間斯人之大幸也抑亦斯人之大危也信而修持福極人天有頂果成菩薩聲聞何幸如之若不尊信輕狎之殘穢之其得禍亦不輕蓋以是書所在多有鬼神護持末世人心信根淺薄必有因是書而得罪於鬼神者豈不大可危哉吾願斯人各幸其所幸而不蹈其所危豫亦可以宣泄之盡告無罪於天人也是則豫之大幸也夫純陽子書
