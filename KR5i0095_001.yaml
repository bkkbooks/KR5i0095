body:
  text: 十戒功過格功過格題詞學道乃身心性命之事也顧身心之垢不除則性命之光難現此功過之所以宜亟講也我孚佑帝師以功過垂訓於世者人間傳有多本原不僅此兩帙近百餘年來以七覺開闡妙道又總以傅戒為先務蓋以戒即功之本過之防也吾覺源之開啓也時為最後而覺源之排列也近巳居首豫忝膺值壇之任惟殷殷以功過勉勵諸子蓋深知功為道之梯航而過為丹之蟊賊也此書妙以十戒定功過復妙以三業定功過其旨精而嚴其義密而賅其權衡品隲確鑿的當而人無遁情事無匿影一豫一奪春秋法也學者日置一冊於座右而實心綜核之則已不啻十目之視十手之指矣其有裨於身心性命者豈淺鮮哉宏教弟子柳守元薰沐題詞
