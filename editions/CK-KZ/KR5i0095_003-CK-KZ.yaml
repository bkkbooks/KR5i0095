眼者一卷爲五十功但纂前人餘唾別無心得者亦作五功實有心得作爲咏歌以自寫其性情足使後學讀之欣然有會於心理之同者一篇爲五功敬作惜字放生戒淫戒賭等文傳世一篇作十功七戒妄語念念肫誠言言篤實謂之戒行圓成戒行圓成者得廣長舌相報得天人敬信報得統理民衆報得生梵天報若不欺本之大悲證菩薩乘習妄本無所爲以習慣故隨口妄應謂之習妄指有言無指無言有見言不見不見言見事無關係者一言爲一過得言不得知言不知意在自謙者非過意在其人爲不足與言爲一過此指可與言者說若不可與言而與之言則爲失言矣心忙言暇心暇言忙常致悞人悞己心本忙也而說無事常爲閒人纏擾而悞己事心本閒也而說有事常致有求於我者不敢啓齒而悞人事無悞者爲一過有悞者爲二過事大者爲五過飢言不飢寒言不寒渴言不渴未飽言飽未醉言醉俱爲溺俗匿情統作一過心知其是順人說非心知其非順人說是雖無關係亦作一過論人者說非作二過誣人罪大說是間可免過隱惡宜然不可免僅作一過大奸惡不可混論事者必有關係當辨論小事五過大事加等妄及君親不分論人論事事大事小統作十過凡一切妄語在君親前者照原格加一等輕許善願力不能成輕約重信勢不能踐者一言爲五過輕議朝廷政治得失一言爲二過妄談官府是非一言爲二過妄談神恠爲一過妄談亂爲五過事非目擊擅述傳訛之言者雖無關係亦作一過有關係者作五過大事十過爲人妄譽人失實意在薦引斯人者爲一過薦引非過妄譽則亂聽者之聰故過不概免譽人失實意在形人之惡者爲二過譽彼之善形此之惡人以爲巧而不知陰律實不能宥意在反形其人之惡者十爲過假如甲有私怨於乙甚稱乙之仁厚以反形其待甲之不堪此小人尖毒之尤譽人失實意在得斯人之歡心者五爲過引黨爲援互相標榜者爲十過毀人失實無仇者一言爲二過有仇者一言爲五過逢迎人意而顚倒是非違逆利害隨順攛掇者一言爲五過人或受害小害二十過大害五十過人或遂非小節二十過大節五十過後二條俱倣此鄙薄斯人不與正語或是非或利害違心妄應一言爲二過人或遂非受害例準前條憎惡斯人而是非利害故誣爲妄者一言爲五過人或遂非受害過準前條妄說機祥以迎人意者一言爲五過意有所貪求者加一等凡妄說災禍以恐嚇人者十爲過意有所貪求者加一等如師巫惑人求利之類爲己妄爲己妄語有罪重惡極者悉入身三惡内口業本微故大者不列自知過悞飾詞遮掩者小事一過大事五過父師前爲十過造言自譽爲五過自爲薦引者爲十過造言惑眾以博廣聞一事爲五過假托鬼神惑人求利師巫邪道興作淫祀過業最重甚者爲五百過小事亦作五十過假托術數誣人取利一事爲五過醫卜星相之類賄托薦引一事爲五十過士習卑汚夤緣特甚不知陰律鑒別極嚴謬托與聞達人交往冀取名利一言爲十過誑騙人財應作百過自炫才能震驚愚眾前造言自譽是僞托他人之言此則自誇自炫也一言爲十過一切施惠於人之事所費本少而說多用力本易而說難俱爲一過詩書文藝强不知以知爲疑悞學人者一次一爲過義理是非强不知以爲知疑悞學人者一次爲五過誤及人之終身者爲百過交妄一切交易買賣以賤稱貴以貴稱賤以多言少以少言多以重說輕以輕說重爲一過僧道行法如做戲世人請僧道行法亦如做戲彼此均無實心虛費錢財僧道齋主俱作五十過功例除積習直口直心畧無隱覆回曲一事一爲功難者加一等事有當謙讓者言必遜順一次一爲功誠實爲人爲人隱惡人或問及妄言不知是功非過小事一功大事二功若故飾詞遮掩則欺所問之人自當作過僅云不知爲當爲人揚善言可激切事難過實過實則譽是過非功不過實者一事爲一功愛憎取舍一出至公言語應酬畧無虛謬一事爲一功若有所疑而未能决者亦當實言不知亦爲一功是非利害直據己見而爲婉商確不以好惡易其心一事爲一功所見不的弗執己見虛心察理一事爲二功誠實爲己不求名利但求無欺不顧利害止憑一直有則有無則無實則實虛則虛一事一功爲不揜己短不炫己長惟求實得不假虛名一事爲二功財利功名安分聽命苟有私徑夤緣絶之弗與爲二百功一言一動一舉念親筆直書畧無隱諱明可告親知幽可告鬼神一月無倦十功爲有一言一念隱諱者非功善方便遏人邪心設說可危之境啟人善念設言可樂之情是功非過邪遏善啓俱作五功大事十功激勵鼓舞善假機權誘掖獎勸得大方便成一人善行者爲五十功鼓舞多人者爲五百功憂疑患難之中以權詞爲慰撫者爲一功空談性命者與之言利濟實行專務有爲者指專以禮懺諷經造寺塑像以爲功者說與之言心性根源一次爲一功八戒貪無一毫愛慕無一毫執著謂之戒行圓成戒行圓成者得一切人世苦樂不能動報得生不還天報若大悲智慧普棄一切卽證菩薩乘貪名人所最難打脫者惟名故以名爲之貪首戒失時不能淡忘者曰懊惱貪一念爲一過得時作得意想者曰自滿貪一念爲一過未得有意求得者曰患得貪一念爲二過未失恐其或失者曰患失貪一念爲二過旣失鬱結顧戀或生怨尤者曰有蔓貪言因一貪別生罪過蔓延不已最難掃除一念爲五過旣得欣幸希冀更生不足者曰無厭貪一念爲五過已有不肯與人者曰慳貪一念爲五過挾有傲人者曰驕貪一念爲五過欣慕人有者曰愛貪一念爲五過嫉妒人有者曰妒貪一念爲十過因愛生求因妒生忮者曰惡貪一念爲二十過一貪未息一貪又起者曰循環貪一念爲十過不關境遇無端忽動可欲者曰夢想貪一念爲五過貪利名稍清利已濁利較名當加一等懊惱貪者一念爲二過自滿貪者免過有知足之心也患得貪者一念爲五過患失貪者一念爲五過有蔓貪者一念爲十過無厭貪者一念爲十過慳貪者一念爲二過驕貪者一念爲十過愛貪者一念爲五過妬貪者一念爲十二過惡貪者一念爲五十過循環貪者一念爲二十過夢想貪者一念爲十過貪安逸不貪名利必貪安佚人情也過宜從輕懊惱貪者一念爲一過自滿貪者免過安佚而自滿宜作功論但見爲得意仍屬貪心患得貪者一念爲二過患失貪者一念爲二過有蔓貪者一念爲五過無厭貪者一念爲五過慳貪者一念爲一過驕貪者一念爲一過愛貪者一念爲二過妬貪者一念爲十過惡貪者一念爲二十過循環貪者一念爲十過夢想貪者一念爲五過貪利養衣服飲食居處妻妾之類俱爲利養貪及利養與勢力益鄙陋矣過宜從重懊惱貪者一念爲二過自滿貪者一念爲一過患得貪者一念爲五過患失貪者一念爲五過有蔓貪者一念爲十過無厭貪者一念爲十過慳貪者一念爲二過驕貪者一念爲十過愛貪者一念爲五過妬貪者一念爲二十過惡貪者一念爲五十過循環貪者一念爲二十過夢想貪者一念爲十過貪勢力爵祿威權車馬僕御之類俱爲力勢懊惱貪者一念爲二過自滿貪者一念爲二過患得貪者一念爲五過患失貪者一念爲五過有蔓貪者一念爲十過無厭貪者一念爲十過慳貪者一念爲二過有勢力不肯分人可無肆橫之患但本原出于慳貪亦不得爲無過驕貪者一念爲十過愛貪者一念爲五過妬貪者一念爲二十過惡貪者一念爲五十過循環貪者一念爲二十過夢想貪者一念爲十過功例忘名不見可欲曰渾忘常得此心爲無量功漠然無所動于其中非德成者不能故功爲無量亦見可欲而不動心者曰淡忘常守此心爲二百功見可欲亦動心而能强制之者曰守忘一事爲十功憶前期後欣戚紛擾中一念正見現前諸紛擾一時解釋者曰遣忘一事爲五功可欲者當前一時不能强制又不能排遣另尋一瀟洒事以當之如十友五師之類曰遯忘一次爲一功忘利渾忘者爲無量功淡忘者爲百五功守忘者一事爲十功遣忘者一事爲五功遁忘者一次爲一功忘安佚渾忘者爲五百功淡忘者爲二百功守忘者一事爲十功遣忘者一事爲五功遁忘者一次爲一功忘利養渾忘者爲二百功淡忘者爲百功守忘者一事爲五功遣忘者一事爲二功遁忘者一次爲一功忘勢力渾忘者爲百功淡忘者爲五十功守忘者一事爲二功遣忘者一事爲二功遁忘者一事爲一功九戒瞋心地平等念念慈悲人不見有賢愚境不見有順逆者謂之戒行圓成戒行圓成者得歡喜自在報得事事如意報得人天敬禮報得生不還天報若慈悲普愛證菩薩乘瞋人因公起瞋者曰公瞋一念爲一過因私起瞋者曰私瞋一念爲二過不見詞色者曰暗瞋一念爲一過稍露詞色者曰現瞋一念爲二過色笑如常胸中常有隱憾者曰鬱瞋暗瞋指一時一事言鬱瞋指久遠言一日爲五過一接遇突生怒意者曰暴瞋一次爲五過一瞋後怦怦不忘者曰長瞋一日爲五過瞋而復喜喜而復瞋者曰亂瞋一次爲五過瞋時遇可喜事不能化解者曰固瞋一事爲十過本無可瞋無故怏怏不遂者曰業報瞋一日爲十過凡犯此瞋者必有惡業將見惡報矣故曰業報瞋境過事移提起復瞋者曰藏瞋一次爲十過瞋此人波及彼瞋彼人波及此者曰蔓瞋一事爲二十過往往遣忘一時盡憶者曰决瞋若水之潰決者一事爲二十過瞋積不休轉成毒恨者曰蛇蝎瞋一事爲五十過怒氣突發不可控遏者曰豺虎瞋一次爲五十過氣填胸臆幾不欲生者曰死瞋一次爲五十過瞋事公瞋者一念爲一過私瞋者一念爲一過暗瞋者一念爲一過現瞋者一次爲二過鬱瞋者一日爲五過暴瞋者一次爲五過長瞋者一日爲五過亂瞋者一次爲五過固瞋者一事爲十過業報瞋者一日爲過十藏瞋者一次爲十過蔓瞋者一事爲二十過决瞋者一事爲二十過蛇蝎瞋者一事爲五十過豺虎瞋者一次爲五十過死瞋者一次爲五十過瞋境人事有可瞋之理境遇無可瞋之情過故獨重公瞋者一念爲二過私瞋者一念爲五過暗瞋者一念爲五過現瞋者一次爲五過鬱瞋者一日爲十過暴瞋者一次爲十過長瞋者一日爲十過亂瞋者一次爲十過固瞋者一車爲二十過業報瞋者一日爲二十過藏瞋者一次爲二十過蔓瞋者一事爲五十過決瞋者一事爲五十過蛇蝎瞋者一事爲百過豺虎瞋者一次爲五十過死瞋者一次爲五十過功例悲人於怦怦拂鬱之時一念正見現前思其無知作惡甚爲可憫者曰求悲一念爲一功不見可悲恆見可惡而强起悲憫之心者曰法悲悲乃治瞋之法故曰法悲一念爲二功前用思維此則不用思維强之卽是故功加倍亦見可惡轉而生悲者曰智悲一念爲十功功夫稍熟故功從重不見可惡祗見可悲者曰大悲一念爲百功一切憂天憫人之意無礙光風霽月之懷者曰體用全悲至此爲無量功聖人德品菩薩深心何功可言悲事於怦怦拂鬱之時一念正見現前思善惡因緣不爽眾生迷妄見業難消者曰求悲一念爲一功法悲者一念爲二功智悲者一念爲十功大悲者一念爲百功體用全悲者爲無量功悲境於怦怦拂鬱之時一念正見現前思苦樂無常轉眼卽同空花漫無根緒世人迷謬妄爲執着者曰求悲一念爲一功法悲者一念爲二功智悲者一念爲十功大悲者一念爲百功體用全悲者爲無量功十戒癡心體如太虛孤月朗朗無翳者謂之戒行圓成戒行圓成者得人天敬禮直超色界歸法性土證菩薩乘痴憶不忘往事曰痴憶不窮理不達事過去悲愉戀戀於中者曰頑癡爲百過窮理達事亦知戀憶之非而心地終搖搖不甯者曰習癡爲五十過自咎妄憶之非而不能斷決者曰忍癡爲二十過一時了悟意空轉眼復憶者曰復癡爲十過癡執妄執當前爲痴執不能窮理達事現前欣戚執滯不化者曰頑癡爲百過亦能窮理達事而執見終不能化者曰習痴爲五十過自咎其痴而不能斷決者曰忍痴爲二十過一時了悟境空轉眼復執者曰復癡爲十過痴逆妄意將來爲痴逆不能窮理達事未來禍福預爲料逆致心境摇摇者曰頑痴爲百過亦能窮理達事而逆意未忘者曰習痴爲五十過自咎其痴不能斷決心猶懸懸者曰忍癡爲二十過一時了悟意止轉眼復逆者曰復癡爲十過癡空有時憶往逆來有時執化空立者曰攪亂痴爲百過念無起處昏沈欲睡者曰幽暗痴爲二百過遊心廣漠漫無歸着者曰虛圓痴爲五百過幽暗痴猶可藥虛圓痴最難醫宜著力破之功例了憶事過卽忘不懷恩不念怨不戀順境不悲逆境者曰業了爲百功隨境生心境過心空者曰意了爲二百功無古無今無過去無現在一念總持不動不變者曰法了爲五百功意中功德難以計數約畧爲格弗可拘泥了執貧富同觀貴賤平等夭夀不貳者曰達了爲百功順逆無常死生瞬息看人世之欣戚悲愉如流水如浮雲了不可執者曰能了爲二百功卽境安心隨分得己一切可着一切無着者曰眞了爲五百功了逆看一切因緣果報皆爲妄作妄受不但惡因惡果爲妄作妄受卽善因善果亦爲妄作妄受不可窮詰了無攀援者曰見了爲百功無過去無未來一息可以千古萬刦不離一息者曰行了爲二百功不見有往不見有來昭然獨覺者曰心了爲五百功了空一念旣空萬緣而一念曾未忘眾生爲境不落空一念旣空萬善而一念曾不捨慈悲爲行不落空一念無始無終滅生滅相而一念實能應感一切無遺漏因爲心不落空俱爲不可言說不可言說難思議功
