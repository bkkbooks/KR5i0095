  text: 十戒功過格重刋道藏輯要
  hash: sha256:caf297259db92013bf579052c67ed08ec86509d4bca8fa08927bfd67faadf99b
  markers:
  - {type: page-break, offset: 5, content: '', id: CK-KZ_KR5i0095_03p001a}
body:
  text: 十戒功過格一名行覈孚佑上帝純陽吕祖天師示定一戒殺念念慈愛在在生機爲殺戒圓成殺戒圓成者得長夀報得多男報得富貴福享報得生天報若慈悲普護并能超越三界證菩薩乘深淺不同隨人自證殺微命一切生物之最蠢者曰微命惡其害人妨事而殺者曰憎殺如蚊蠅蚤虱之類一次爲一過至百命外加一過千命作十過貪其滋味或利其毛骨而殺者曰愛殺如蝦螺爲饌牡蠣爲藥蚌珠爲飾之類一次爲二過至百命外加二過千命爲二十過無心而殺者曰誤殺如焚野戽田水火誤傷之類至千命爲一過牢養調弄曰戲殺如鬬蟋蟀拍蝴蝶之類一命爲一過雖不傷命而調弄不放亦爲一過見卑幼牢養調弄可禁止者不爲禁止亦作一過以無慈心故也教人漁捕曰倡殺一次爲十過置造殺器曰普殺一器爲五十過乩訓曰凡漁獵屠膾終身之殺皆置造殺器之人所教也一人造殺器千人之殺皆因之故陰律獨重殺小命微有知者曰小命憎殺者如蛇虺害人獾兎害田之類一次爲二過愛殺者家畜雞鵞野畜雉兎之類每一次爲五過愛殺例比憎殺加一等一二五下三等也十二十五十中三等也百二百五百上三等也凡言加一等者依此祭祀邪鬼燕會奢靡者曰縱殺每一命爲二過祟邪則傷正行奢靡則傷儉德故過獨重誤傷者一次爲一過戲殺者如養八哥畫眉鬬鵪鶉之類一次爲二過雖不傷命而調弄不放亦爲一過見卑幼調弄可禁止者不爲禁止亦作一過倡殺者一次爲二十過普殺者一事爲五十過微命普殺鼠藥鼠籠之類小命普殺網刀杖之類殺大命大有知者曰大命憎殺者虎狼之類已傷人者其罪宜死殺之反爲功憎殺或因愛人起見者如孫叔敖埋蛇周孝侯斬蛟射虎之類俱可爲功未傷人者殺之則爲過以無死罪故必爲過功與過俱以五爲準貪其利而殺者爲十過愛殺者家畜猪羊野畜獐鹿之類一命爲十過爲祀典戎政孝養殺者非過縱殺者一命爲二十過誤殺者一命爲五過戲殺者如弄猢猻之類一命爲二十過雖不傷命而或開囿闢園繫猿養鹿者一事亦爲十過卑幼有調弄者可禁不禁亦作五過倡殺者一次爲五十過普殺者如打造鎗刀弓箭鳥銃等軍器一事爲百過併可傷人過故特重業此者終身共爲千過僅千過者與以改悔之路也奉官命制造者非過無故殺有功於世之畜曰忍殺如牛馬駝象之類無故者無祀典戎政等故也一命爲五十過殺人命人命無憎殺愛殺諸條者以其顯背王章不通懺悔不得以過言故也醫術不精寒𤍠誤施攻補錯用致傷人命者亦曰誤殺一人爲五十過非大寒大𤍠大攻大補之劑及無反背形跡者不作過論若貪其利而故爲行險者爲百過此貪謝儀而行險徼倖者與人爭名而故爲行險者亦爲百過此好爲立異以求名者若他人調治不錯故說其錯妄爲翻案致誤人者貪名貪利二俱有之爲二百過溺一子女亦爲忍殺此亦顯背王章不通懺悔者但世有生女不舉之風故復列此爲五百過人命非輕天性更重本難以過計曰五百者律數止此也墮一胎爲二百過傳人一墮胎方藥爲百過殺類見殺生歡喜心者曰喜殺爲己所憎之人物恆有是情微命一過小命二過大命五過人命十過見殺稱其便捷者曰贊殺微命一過小命二過大命五過人命十過見漁獵所獲稱其得利見寃對報復稱其快心者曰慶殺微命小命一過大命二過人命五過慶殺較喜殺贊殺減等者以其有愛人之心也見殺聞殺勢可救而不救者曰忘情殺微命小命爲一過大命爲二過人命爲二十過若人命勢易救而不救者爲五十過易救不救此命由我死矣食見殺聞殺特殺之肉者曰溺情殺俱一次爲一過惟爲君親所賜以及餕胙所食者非過好勇鬬狠者曰間殺言與殺止差一間也且間或有殺者一次爲二十過人與我鬬狠不能忍者十過我與人鬬狠釁非人開者爲五十過若欺其孤弱者爲百過骨肉間爲二百過悖理滅倫乃過之極重者鑿井穿渠抛棄一無主骸骨曰橫殺爲二十過以禮改葬之免過以禮者謂盛以小襯祭以酒肴淩虐下人不恤其飢寒痛苦卒至傷生者曰殘殺一命爲百過傳人一魘魅方藥曰試殺爲五十過蠱毒魘魅王章列於十惡不赦之條本不當存此但世有好奇之人原無殺人之心或因方藥之奇而妄爲傳述者過亦不少殺機前殺類猶可加以殺之名此殺機已盡冺乎殺之意但充類至義之盡亦無非一殺之機也故曰殺機無心累人凍餓一時爲一過有心者指戲侮者言爲五過因憎其人而故爲害彼者十過行路慌張或置器不正累人傾跌顚危者爲一過有心戲侮者爲五過因憎其人而故爲害彼者十過淩虐下人一次爲五過下人有過可責也或以竹枝或以戒方或手受或股受小過以五下爲準大過以十下爲準此卽尙書所謂扑作教刑也若責非其器具責非所受處責過於其數俱爲凌虐不恤下人饑寒疾痛一次爲一過飢寒必爲保恤疾痛必爲調治忍視者爲過更責以勞役過加一等阻遏窮苦人營謀一次爲十過此指營謀之不傷義犯刑者言若謀爲非歹勸正之反作功論見人倡義作利濟事不竭力贊成爲一過因爭名起見者爲五過反阻撓之爲十過因爭名起見者爲五十過已成而毀敗之爲五十過大事爲百過因爭名起見者爲二百過利濟之事如建立社倉開設義學修平道路葺造橋梁設立憩亭渡船疏通河道井泉糾集惜字放生施藥施棺施蚊帳棉袄涼茶薑湯煮賑育嬰養老施義塚施燈籠等會皆是凡遇老年之人殘疾之人生厭薄心者爲一過見於辭色爲二過甚者爲五過悔而復然者爲十過過難於悔旣悔而復然過終不能改矣過當加一等諸條悉以此爲例父母年老眼昏耳聾人子奉侍偶生憎厭之心者一次爲十過念頭動處卽是稍露辭色爲二十過甚者爲五十過父母有病不擇醫調治一日爲五十過不謹慎湯藥委之下人一次爲二十過不多方供奉甘旨一日爲十過病時有不得輕進甘旨者非過昆弟夫婦有疾不慎擇醫一日爲十過庸醫往往誤人有病者不可不愼擇愼擇之道必須自己知醫不恤父母筋力老年父母家事已謝者惟睡眠飲食而已或有操作皆人子之過也聽其操作一事爲五過末世澆風并有役使父母者實難以過論此眞地獄之種子也家庭間有嫌怨弟兄妯娌之間難保必無嫌怨但以一誠爲感格要亦不難消釋不急爲消釋者小事以三日爲準大事以十日爲準一事爲十過甚至骨肉乖離者爲百過一有小嫌卽爲解釋何至乖離苟或不知解釋漸積漸深勢必至於乖離矣久淹親柩者一𡻕爲五十過此指經營別務絕不經心者言因貧不能成禮而久淹者一𡻕爲十過喪禮稱家有無不宜久待故亦爲過若惑於風水而久淹者一𡻕爲二十過若因兄弟爭論財費而久淹者一𡻕爲百過貧賤故舊親戚厭其往來一念爲一過待之不以禮一事爲五過卽非親族故舊但生憎厭亦爲一過妬人所有以敗爲歡一念爲二過生一幸災樂禍心者爲五過若因私怨生心者爲十過凡惡人得現報正當觸目警心反躬自省或哀之憫之方爲正覺若一生幸災樂禍之意便有害於人心爲過已不小矣况或出於私怨者也遇鰥寡孤獨之人一切交關不存忠恕寬厚之心爲一過或反欺侮之爲十過甚者爲五十過破人婚姻未成者爲十過已成者爲五十過此指方結親時說或以門戸不對貧富不等而一言打破者夫妻欲離異爲之主謀者五百過不與其謀而凂作離書順情應之者爲百過敗人苗稼田畔有高下之分水道有蓄洩之利同畔不仁恒多暗損至於合塘分水强者占利皆爲敗人苗稼若乃撒稗揠苗實非人情不在過例一次爲十過禳災不修善行反許牲牢惡願爲十過設一機械陰謀坑䧟人者小事爲十過大事爲五十過極大事爲百過小事䧟人失利大事䧟人失名極大事䧟人於獄訟有是心而事未及行者減二等減二等謂小事二過大事十過極大事二十過也習學拳棒𠒋器爲十過狼籍字紙五穀爲不恤生人之本一次爲一過至千字千粒外者加過嗜碁一日爲二過古語云善畫者多夀爲其觸筆皆生機也善奕者多夭爲其動念卽殺機也抑且費時失業故列爲過功例救微命觸境生憐方便釋放者曰哀救一次爲一功此見其困苦實生憐憫之心者故功獨重至百命外加功凡云一次一功者雖一命亦作一功凡云百命外加功者核命數計功則以百命爲一功千命爲十功萬命爲百功過亦倣此例作意放生勞力營救者曰力救一次爲一功百命外加功出錢買放者曰破財救自百命至千命爲一功千命外加功出錢買放富貴易爲且心與力俱輕功宜減等所費照三十文爲一功例另記後俱倣此鑿池開囿廣勸放生者曰法救倡義者爲百功利非一時功能溥及故功最大所費總照三十文一功例另記救小物命哀救者一次爲一功一命亦爲一功力救者一次爲一功一命亦爲一功破財救者一次爲一功費以三十文爲一功法救者一事爲百功有費照前例因放生致缺孝養親心不當反爲二過親心悅功可加一等救大物命救大物命必生哀憫之心又必費力且必費財故不分三等救一傷人之物曰過情救虎狼之類爲二功費依前例救一無害於人之物曰大慈救羊豕獐鹿之類爲十功救一有功於世之物曰報德救牛馬之類爲五十功設法禁止屠殺牛犬或勸化屠獵等人改業曰普護救爲百功空言無裨者亦作一功救人命精於醫術救一危症作五十功重症作二十功大症作十功輕症作五功小症作二功極小極輕症如瘡癤疥癬之類亦作一功惟受謝者非功功或浮於所謝仍可補記假如救一危症應得五十功以三十文爲一功算應受謝錢一千五百文謝不及數餘功自當補記力救一被焚被溺者爲五十功有費另記哀救一無依子女設法收養得長成爲二百功使之終身得所爲五百功卽不長成亦爲百功阻人溺子墮胎一命爲二十功見有負寃受獄者苦心戮力出之俾死刑得生重罪得減均爲五十功絕殺類見殺不能救生哀憫心者曰心救一次爲一功微命爲二功微命功反多者以其難起哀心故也見殺不能救口稱可憐冀人解釋者曰口救一次爲一功見殺聞殺特殺之肉不忍食一次爲一功見人好勇鬬狠力爲勸救一次爲二功人有與我鬬狠者閉戸避之爲十功塟一無主骸骨爲二十功有費另記倡義作利濟事大事百功如建義倉設義學施棺施蚊帳綿袄煮賑等事小事五十功如造橋平路建立茶亭渡船等事細瑣事二十功如糾惜字放生施凉茶施姜湯施燈籠等會之類若有力者議建常平社倉普利天下育嬰育老功垂後世俱作五百功凡有費皆照例另記妾媵生育主母撫之時時與已出者比較每一念爲一功事事不致軒輊每一事爲一功爲絕分親知絕後者立繼并教養之一人爲二百功至成立爲五百功不毀傷巢卵雛麛一次爲一功見人有毀傷者勸止之亦爲一功魚子不經鹽三年猶可活凡人食魚捨子均可爲功杜殺機飢人與之一飡凍人與之一衣費宜另記扶持一顚危人指引一迷路人無歸者留之一宿俱爲一功寬恕下人過犯矜恤下人飢寒疾痛俱一次爲一功見人倡義作利濟事極力贊成爲十功不費財力口稱揚之亦作一功見人流落無依不忍爲丐乞者爲之謀一安身處爲五十功凡人忍爲丐乞者雖有安身處亦不能久異鄉人流落不得歸助之盤費三千文爲一功倡義爲之凑集盤費爲十功善解一仇爲十功仇深者爲五十功父母生死之仇不在此例事父母服勞奉養先意承志每致親心喜悅一次爲一功父母有勞動處善爲勸止親安而悅者一次爲一功兄弟間任勞推逸一事爲一功勸人弗事刀筆一次爲一功見從永戒爲二十功勸人弗離婚爲一功能委曲周旋之爲五十功有費另記勸人弗暴殄天物爲一功暴殄飢歉之因也以此勸人功亦最大勸人放生一人見從爲十功矜恤鰥寡孤獨之人一次爲五功有費另記凡言矜恤者必起哀憐心或酒食惠施或盤飱遺餽皆是卽空言慰撫亦可爲功但應減等矜恤貧苦親戚故舊一次爲五功有費另記下同矜恤遇災禍者一次爲五功矜恤老年殘疾之人一次爲二功奸惡之人陰謀害人乘間勸止一事爲十功俗學迂儒必以擇交立論一切奸惡之人避之如仇而不知具大智慧得大慈悲有大機權者正當深入此輩之室而爲之轉移若係有權力者更宜留心結契轉變有法常得一言而利及天下可徒高一己之名而概以奸惡絕之耶害大者功宜加等成全一困苦人營謀小事一功大事十功小事指一時之利言如稱貸貨賣之類大事指久遠之利言如技術經營之類二戒盜事事光明正大念念舍己利人謂之戒行圓成戒行圓成者得大富報得人盡力報得所願必成報得爲天神報若慈悲普捨證菩薩乘盜財劫奪穿窬者顯犯王章不通懺悔不在過欺隱人財物人必生疑者曰明盜一次爲一過三十文外加過雖一文亦爲破戒亦當記過大約過有輕重以三十文爲準非謂不滿三十文卽非過也記法自一文至三十文俱爲一過自三十一文至六十文俱爲二過自六十一文至九十文俱爲三過也後俱倣此欺隱人財物而人不生疑者曰暗盜一次爲二過二十文外加一過欺隱人財物恐人生疑而因賈罪於人者曰誣盜一次爲五過十文外加一過乘急苛取恃强轄取者曰挾威盜一次爲五過至十文外加過背衆私取恃智巧取者曰挾詐盜一次爲二過二十文外加過取窘迫人所有或患難人所遺者曰絕命盜一文爲一過盜且兼殺過得不重乎受人寄託代人買賣於中欺隱者曰典守盜一次爲二過二十文外加過欺隱家長眷屬之物以及官府公物者曰滅倫盜十文爲一過盜名名爲天地所忌且人之愛名更甚於愛財盜戒宜嚴竊人之才能以爲己有如文章技藝非己所有攘竊成名者明盜一次爲一過暗盜一次爲二過事之大者如功名中己得名卽累人失名過加三等竊人之善以爲己有者如公善倡義自人冒稱倡義自己者私善人本自出至誠冒稱勸之自我者明盜一次爲二過暗盜一次爲五過竊人之惠以爲己有者恩惠出之自人冒稱出之自己小事二過大事五過人終不得白己或受其報者爲十過竊人之功以爲己有者如醫藥謀望中多有小事五過大事十過人不得白己享其利者爲二十過凡報恩報怨假公濟私者小事五過大事十過妄執邪見倡爲異教惑衆取利者曰邪盜倡者五百過從者百過天主大成青衣白衣等類皆是盜命盜竊之中恆有性命所關者雖念不及此而過自重謀人產業奪人生理者一事爲五十過若係暗盜陰險特甚應作百過甚者二百過致人失業困苦爲五百過盜人秘密訣法致人失業者小事十過大事二十過己享其利者爲百過賣僮婢貪重利致不得所者曰坑䧟盜一人爲五十過誘人嫖賭於中取利者曰極惡盜一次爲百過以春方邪藥售人者曰蠱盜一次爲五十過以採戰邪術惑人求利者曰妖盜一次爲百過盜充無盜之跡有盜之心或無盜之心類盜之跡者皆名之曰盜充使用輕重戥秤大小升斗者曰市行盜一次爲一過攛掇卑幼盜廢家長財物者曰教盜一事爲五過喜人奢靡或攛掇人奢費者曰耗盜一事爲一過乞假用物遺悞他處以致無還者曰懈盜一事爲一過無心誤取人用物如夾帶之類曰誤盜累人尋覔或致失事者一次爲一過爲人用財過於寬厚借人財物以邀結自己聲名者一次爲五過立意爲人求名者免過如馮讙爲孟嘗焚劵之類不當者一過勸人淫祀以及祈禳者一次爲二十過勸人捨財非實落功德徒市一已聲名者如建鬼神祠宇之類百錢爲一過以上三條俱曰偏盜偏執一己之見故曰偏盜規避差徭曰罔上盜一次爲二過博弈賭勝曰戲盜一次爲二過前條殺戒中所列是指不賭勝者說故過輕此指賭勝者則名爲博弈實則賭具矣故過特重攙和五穀曰明欺盜一次爲一過酒冲水布刮漿等類俱可例推用意探人隱微曰鬼伺盜一事爲二過倡義爲無益事擾累地方者曰妄盜如高檯扮戲賽神行會之類一次爲五十過更有私心於中取利者爲百過縱六畜食踐他人五穀墳塋者曰傷本盜五穀爲生人之本墳塋亦爲水源木本故曰傷本盜一次爲五過不義中更兼不仁過自不輕買賣交易貪取便宜曰小見盜一次爲一過誤得假銀復用於人者曰償失盜三十文爲一過教人燒煉鉛汞曰欺天盜一次爲百過見燒煉丹書不急焚毀曰遺害盜一書爲十過名雖燒煉其實用銅爲之者必遭天譴然世人爲貪心所使見是書而惑志者多故必燒盡以絕後患盜原好奢好懶盜之原也正本清源多在勤儉飲食嫌惡薄衣服嫌樸陋居室嫌湫隘器用嫌粗惡俱以一念爲一過飲食必求肥甘衣服必求鮮麗居室必求塏爽器用必求精良俱一念爲二過此未見於事爲飲食嫌惡薄求肥甘費十文爲一過衣服嫌樸陋求華麗費百文爲一過居室嫌湫隘求塏爽費千文爲一過器用嫌粗惡求精良費百錢爲一過無力强費者加一等因之違要負約者加二等有食於人嫌其淡薄不成禮者一念爲一過縱飲饕飱曰狗盜俱一次爲二過縱飲至醉饕飱至傷爲五過乩訓曰酒之爲禍殺盜淫三業皆因之葢酒能亂性暴發貪嗔貪合於財則爲盜之原貪合於色則爲淫之媒嗔生於暴則爲殺之機欲戒三惡必先戒酒卽不能絶亦務在節之毋爲所困可也廢業遊閒一日爲一過日中無故睡眠爲一過賓客燕會崇尙奢靡一次爲二過甚者爲五過若以奢靡驕人者爲十過凡便飯過四簋宴會過八簋一席而山珍海錯無不備者皆爲奢靡縱婦女置金珠艷飾一事爲五過所費以三十文爲一過小兒衣紬帛一事爲五過非惟習奢抑且減福故宜重戒縱婦女入廟燒香通僧尼往來者曰陰恠盜一次爲五過置造戲具簫笙紙牌之類小事爲十過大事爲五十過於一切吉凶之禮作無益之費均以三十文爲一過托節儉之說於父母四事供養不盡其誠一事爲十過甚者爲五十過四事供養謂飲食衣服湯藥卧具也爲人師者授藝不能盡心一日爲一過一切得人心力錢而不實心爲人辦事者同論虛稱奉教修功不辦實心克治者曰侮法盜一日爲一過功例捨財愛其人而捨者曰喜捨如敬老慈幼愛有德有能之土因而有所餽遺者一次爲一功三十文外加功若趨炎附勢貪名利或喜結納者非功憐其人而捨者曰悲捨如施乞丐救飢寒之類一次爲一功三十文外加功借以邀世譽者非功人受其惠已無所損者曰自然捨如爲人愛惜財物及拾遺還人之類每次爲一功值百錢外加功費心費力而不受謝者曰力捨如醫家送方力士効力或爲人謀事爲人息爭等類每一事爲一功有成效者小事二功大事十功爲人賠墊以成其事應補以息人爭而事過無償不露聲色者曰暗捨一事爲五功因之自矜者減一等十文外加功意有所爲者非功設法廣募澤可遠布者曰法捨每一事爲五十功大事爲百功極大事爲二百功貪名者功減二等損貲刋刻善書曰教捨費三十文爲二功見人有急理可取而不取曰慈捨三十文爲二功意有所爲者非功捨名己有才能爲人盜竊不求表白者曰忘能捨一事爲一功人有爲我表白者謙不受曰讓能捨一事爲五功己有善行爲人盜竊不求表白者曰忘善捨一事爲二功人有爲我表白者謙不受曰讓善捨一事爲十功己有恩惠及人爲人攘奪不求表白者日忘恩捨一事爲五功人有爲我表白者謙不受曰讓恩捨一事爲二十功善大而惠小讓恩之功較之讓善更多者以人之情往往捨大而不能捨小也人有盜行賈禍於我者甘受不白曰容濁捨一事爲二十功無端受人謗毀反己自責自修不求暴白曰增進捨一事爲十功捨命產業生理一切資生之事人有與我爭奪者讓之不較是非不怨窮困曰安命捨一事爲五十功此指以命自慰者言若以大悲心忘我窮困喜人得利者爲二百功若見得一切無常絕不關心者爲五百功忍飢而飯人忍寒而衣人傾囊而濟人曰忘命捨一事爲百功小事如一飯之德亦作十功惟有爲者非功如慕色之類不避艱難捐軀救人曰全身捨一事爲百功事非君親尙宜酌量或爲天下利害起見方可爲此大事五百功絶盜充戥秤斗斛出入公平若肯吃小虧曰無形捨一次爲一功值十文外加功勸人節儉曰口舌捨一次爲一功乞假人用物爲人細心愛護如期送還及借人書籍爲之修釘破損改註訛字俱爲一功不避差徭不逋稅課俱一次爲一功交易借貸不違要約必如期爲一功租債出入稍存寬厚一事爲一功三十文外加功交易買賣貨眞價實不攙和不虛誑一日爲一功倡義禁止作爲無益擾累地方等事一事爲二十功如禁止高檯演戲賽神行會元夜鬧燈五日競渡等事若因爭名起見或因私忿起見者非功焚燬一壞人心術書爲一功如燒煉方書房術之類斥逐一强梁童僕爲十功別有所爲者非功誤得假銀卽棄不用值三十文爲一功謹守盜戒一草一葉不與不取一次爲一功如不告主人攀折花枝之類謹盜原飮食不嫌惡薄衣服不嫌樸陋居室不嫌湫隘器用不嫌粗惡俱一念爲一功此爲初學言之也亦自見爲惡薄樸陋湫隘粗惡而强忍之故以爲功若至德成并不見爲惡薄樸陋湫隘粗惡矣又從何處記功總之功過全在天理人欲交戰處定案人欲勝則爲過天理勝則爲功全盡天理功過二字俱可不立餘悉倣此飲食衣服居室器用力堪華膴而甘心淡泊節以施人存是心者一念爲二功有食於人或遇於淡薄不成禮心反慕樂喜其節儉者一次爲一功飲不求醉飯不求飽思天下飢者渴者虛己節省家食外食皆同一次爲一功終日勤敏不致虛縻廩粟一日爲一功士農工商各盡其業便是一念之貪皇皇求利者非功革一奢靡俗習爲十功並能化及他人爲二十功釀成風俗爲二百功勸一人勤儉作家爲二十功卽不聽從亦作一功以勤儉教家子弟謹率家規一月不亂可作一功終𡻕不亂可作十功習於寬厚樂善喜施功亦準此一切吉凶之禮不事虛文如婚禮鼓樂彩轎燈棚之類喪禮紙俑綵亭以及喪車飾以綵帛之類生子三朝彌月朞𡻕廣作湯餅之會之類事難枚舉全在達者敦本抑末轉移風俗當思不止爲一身計方妙敦崇儉樸一事爲十功三戒淫接遇惟禮忘男女相謂之戒行圓成戒行圓成者得功名顯達報眷屬貞良報超越欲界得生十八梵天報若慈悲普護證菩薩乘淫婦有關名分者爲根本重罪犯之不通懺悔必墮地獄不在過例恃財恃勢誘劫成淫情愛實輕者曰暴淫一人爲五百過僕婦爲二百過情好纏綿死生不解者曰痴淫一人爲二百過僕婦爲百過本非有意境地偶逢彼此動情不克自持者曰寃業淫一人爲百過僕婦爲五十過旣犯淫戒復對人言者曰宣淫一次爲五十過此於本等淫業罪過外加錄意有所求邪緣未集妄稱有私者曰妄淫一事爲五十過自妄邪淫實非情理然今世少年以惡爲能者往往有此故列以爲戒淫孀女暴淫一孀婦閨女爲千過惡不可逭難以計數曰千過者約辭也亦見其惡之出格而已必受三途之報又何功之可折除哉婢女爲五百過痴淫一孀婦閨女爲五百過婢女爲二百過冤業淫一孀婦閨女爲二百過婢女爲百過爲孀婦閨女宣淫一次爲百過妄淫者加一等孀婦之名節獨重妄淫之罪亦獨重淫僧尼僧尼者爲破佛律儀亦名根本重罪恐世不解故復列此暴淫一僧尼爲無量過必受地獄