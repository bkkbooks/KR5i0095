為四面周全者一事五十功為明周全者一事十功為暗周全者一事五十功為巧周全者一事百功杜唆隱立心正直略無諂曲遇有是非力為排解者一事為一功大者為五功立心慈恕素無仇隙遇有是非力為排解者一事為一功大者為五功不為名不為利好為人解紛息爭者一事為二功以上俱指口舌解紛不指成功說立心謹愼語不輕出一事為一功此指欲言而忍默者和一鬬息一訟易為力者為五功難為力者為十功事關骨肉至戚者和鬬為二十功息訟為五十功絶唆類聞人嫌怨人語譏誚人語隱諱不宣者一功善言勸戒者二功聞人有仇恨人意仇恨人語善為解釋者一事二功人有謀望或者從中阻撓力為勸諭更不泄其阻撓之意者為五功不聽刁唆自和朋舊一事為五功不許婦女談論他人是非一次為一功不許婦女小兒僕婦使女告訴嫌怨傳述是非俱一次為二功不許者凡有告訴傳述者必斥責之正教之是也不竊聽人私語一次為一功不窺人私書一次為一功六戒綺語即溫聽厲必敬必恭謂之戒行圓成戒行圓成者得多人恭敬報得威權赫奕報得生諸梵天報若大悲平等不敢輕視一切衆生得證菩薩乘戲笑但笑而不言以示意者為戲笑見人失遂而戲笑者一次為一過失遂如人傾跌失物染汚之類見人禮貌語言失錯而戲笑者一次為二過見人形貌不全而戲笑者一次為二過見人為不務本業事而戲笑者一次為二過見人為剛戾不仁事而戲笑者一次為二過見人自稱才智技能而戲笑者一次為二過見人自譽德望自矜功能而戲笑者一次為二過見人受屈辱而戲笑者一次為五過見尊長有失而戲笑者一次為五過戲調言不正出以譽為嘲者曰調見人失遂反稱得意者如人傾跌曰好是也一次為二過見人禮貌語言錯失反稱正如是者如稱家父誤曰尊翁先父之類一事為二過更或效之致他人笑者為五過見人形貌不全反稱甚好者如對禿者言省得箆頭等之類一言為二過見人為不善事反稱豪舉者一言為五過見人自稱才能自譽德望順其詞而甚之以為調者一言為二過逆其詞而折之以為調者一言為五過見尊長有失而戲調者一言為十過戲嘲以戲語為譏彈者曰戲嘲嘲人失遂一次為五過嘲人禮貌言語失錯一次為五過嘲人形貌不全一次為五過嘲人不務本業事一次為二過嘲人為不善事一次為二過關淫盜者為十過嘲人受屈辱者為二十過能受屈辱是大善事是大善人反調嘲之恐敗其德故過特重嘲人自譽才能德望者一次為五過嘲及尊長者一次為二十過戲謔粗獷不論辱人求勝為戲謔稱人諢名一次為一過造人諢名一人為五過因而其名大彰不得沒者為二十過以人妻子眷屬為戲謔者一次為十過子前嘲其父父前嘲其子夫前嘲其妻妻前嘲其夫以及翁壻甥舅之前互相調嘲者一事為五過以閨閫事相戲謔者無關係為五過有關係為五十過無關係如嘲人懼內之類有關係如嘲人外遇之類戲謔及鬼神者一言為十過戲謔及古人者一言為五過戲謔及聖賢仙佛者一言為二十過戲謔及經書者一言為五過以畜比人以後方口俱一言為一過戲筆妄恃文藻戲弄筆墨曰戲筆刻意形容醜事事涉古人為一過事涉今人為二過善翻古人成案如武王非聖人論之類一事為一過戲作詩歌嘲笑古今人物一事為二過戲作妖艷傳奇一書為五十過欺人不知於贈送詩文中暗為嘲笑者一事為十過造人揭為二十過批評傳奇小說贊歎才子佳人與邪盜奸淫之事以炫人心志者為二十過纂集古今戲說文詞一卷為五十過纂集古今情詩艷語一卷為五十過纂集古今男女私情事蹟一卷為五十過録淫艷之詩一首為一過造一風情語作一淫艷詩俱為五過留連歌詠古今閨怨情詞一次為一過功例體敬未及慰撫規勸但以哀愍心起肅恭貌者曰體敬見人失遂肅然起不安意一次為一功見人體貌語言失錯不失恭敬者一次為一功見人形貌不全惄焉生悲者一次為一功見人受屈辱而肅然起敬者一次為一功見人自譽我敬不懈者一次為一功見卑幼有失仍不失敬者為二功敬慰撫慰人必本於敬不敬人必自愧見人失遂以好言撫慰之一次為二功見人禮貌語言失錯善言教正之一次為二功見人形貌不全者善安撫之扶持之如孔子詔師冕階也席也之類一次為二功見人受屈辱者撫慰之贊揚之一次為二功見卑幼有失善為教導不以笑傲待之一次為二功敬勸勸人必本於敬方能感人若有一毫不敬人反以為嘲笑之矣見人好賭委曲勸止之為一功若聽從為二十功見人好嫖委曲勸止之為一功若聽從為二十功勸人務本業為一功聽從為十功勸人勤讀書為一功聽從為十功勸人孝悌為二功聽從為五十功勸婦人孝翁姑敬丈夫和妯娌俱為二功聽從俱為五十功勸人天倫眷屬和睦為二功聽從為二十功勸人弗鬬狠為一功聽從為五功勸人弗爭訟為一功聽從為十功勸人樂善好施為二功聽從為二十功勸人弗奉淫祀為一功聽從為五功勸人弗作為無益為一功聽從大事二十功小事十功大事如演戲迎神擾纍地方等事小事如博奕吹彈廢時失業等事勸人捐懲小忿為一功見從為五功君父大仇不可捐無可勸勸人敬惜字紙五穀見從為一功勸儒者弗謗仙佛釋道弗薄儒修為一功敬筆刻意形容善事事涉古人為一功事涉今人為二功翻古人成案確能為古人雪千百世之寃者一事為十功敬作詩文贊揚古今忠孝節義人物一篇為二功為孝悌節義人立傳形容逼肖可以風世者一篇為五功作詩歌贊揚人善事一篇為一功作詩歌道稼穡艱難可以風世者一篇為一功作詩歌道福善禍淫足以勸懲千百世者一篇為二功纂集善書一卷為二十功纂解經書深入理趣足開後學正法眼者一卷為五十功但纂前人餘唾別無心得者亦作五功實有心得作為咏歌以自寫其性情足使後學讀之欣然有會於心理之同者一篇為五功敬作惜字放生戒淫戒賭等文傳世一篇作十功七戒妄語念念肫誠言言篤實謂之戒行圓成戒行圓成者得廣長舌相報得天人敬信報得統理民衆報得生梵天報若不欺本之大悲證菩薩乘習妄本無所為以習慣故隨口妄應謂之習妄指有言無指無言有見言不見不見言見事無關係者一言為一過得言不得知言不知意在自謙者非過意在其人為不足與言為一過此指可與言者說若不可與言而與之言則為失言矣心忙言暇心暇言忙常致誤人誤己心本忙也而說無事常為閒人纏擾而誤己事心本閒也而說有事常致有求於我者不敢啓齒而誤人事無誤者為一過有誤者為二過事大者為五過飢言不飢寒言不寒渴言不渴未飽言飽未醉言醉俱為溺俗匿情統作一過心知其是順人說非心知其非順人說是雖無關係亦作一過論人者說非作二過誣人罪大說是間可免過隱惡宜然不可免僅作一過大奸惡不可混論事者必有關係當辨論小事五過大事加等妄及君親不分論人論事事大事小統作十過凡一切妄語在君親前者照原格加一等輕許善願力不能成輕約重信勢不能踐者一言為五過輕議朝廷政治得失一言為二過妄談官府是非一言為二過妄談神怪為一過妄談亂為五過事非目擊擅述傳訛之言者雖無關係亦作一過有關係者作五過大事十過為人妄譽人失實意在薦引斯人者為一過薦引非過妄譽則亂聽者之聰故過不概免譽人失實意在形人之惡者為二過譽彼之善形此之惡人以為巧而不知陰律實不能宥意在反形其人之惡者十為過假如甲有私怨於乙甚稱乙之仁厚以反形其待甲之不堪此小人尖毒之尤譽人失實意在得斯人之歡心者五為過引黨為援互相標榜者為十過毀人失實無仇者一言為二過有仇者一言為五過逢迎人意而顚倒是非違逆利害隨順攛掇者一言為五過人或受害小害二十過大害五十過人或遂非小節二十過大節五十過後二條俱倣此鄙薄斯人不與正語或是非或利害違心妄應一言為二過人或遂非受害例準前條憎惡斯人而是非利害故誣為妄者一言為五過人或遂非受害過準前條妄說機祥以迎人意者一言為五過意有所貪求者加一等凡妄說災禍以恐嚇人者十為過意有所貪求者加一等如師巫惑人求利之類為己妄為己妄語有罪重惡極者悉入身三惡內口業本微故大者不列自知過誤飾詞遮掩者小事一過大事五過父師前為十過造言自譽為五過自為薦引者為十過造言惑衆以博廣聞一事為五過假托鬼神惑人求利師巫邪道興作淫祀過業最重甚者為五百過小事亦作五十過假托術數誣人取利一事為五過醫卜星相之類賄托薦引一事為五十過士習卑汚夤緣特甚不知陰律鑒別極嚴謬托與聞達人交往冀取名利一言為十過誑騙人財應作百過自炫才能震驚愚衆前造言自譽是僞托他人之言此則自誇自炫也一言為十過一切施惠於人之事所費本少而說多用力本易而說難俱為一過詩書文藝强不知以知為疑誤學人者一次一為過義理是非强不知以為知疑誤學人者一次為五過誤及人之終身者為百過交妄一切交易買賣以賤稱貴以貴稱賤以多言少以少言多以重說輕以輕說重為一過僧道行法如做戲世人請僧道行法亦如做戲彼此均無實心虛費錢財僧道齊主俱作五十過功例除積習直口直心略無隱覆回曲一事一為功難者加一等事有當謙讓者言必遜順一次一為功誠實為人為人隱惡人或問及妄言不知是功非過小事一功大事二功若故飾詞遮掩則欺所問之人自當作過僅云不知為當為人揚善言可激切事難過實過實則譽是過非功不過實者一事為一功愛憎取舍一出至公言語應酬略無虛謬一事為一功若有所疑而未能决者亦當實言不知亦為一功是非利害直據己見而為婉商確不以好惡易其心一事為一功所見不的弗執己見虛心察理一事為二功誠實為己不求名利但求無欺不顧利害止憑一直有則有無則無實則實虛則虛一事一功為不掩己短不炫己長惟求實得不假虛名一事為二功財利功名安分聽命苟有私徑夤緣絶之弗與為二百功一言一動一舉念親筆直書略無隱諱明可告親知幽可告鬼神一月無倦十功為有一言一念隱諱者非功善方便遏人邪心設說可危之境啓人善念設言可樂之情是功非過邪遏善啓俱作五功大事十功激勵鼓舞善假機權誘掖獎勸得大方便成一人善行者為五十功鼓舞多人者為五百功憂疑患難之中以權詞為慰撫者為一功空談性命者與之言利濟實行專務有為者指專以禮懺諷經造寺塑像以為功者說與之言心性根源一次為一功八戒貪無一毫愛慕無一毫執著謂之戒行圓成戒行圓成者得一切人世苦樂不能動報得生不還天報若大悲智慧普棄一切即證菩薩乘貪名人所最難打脫者惟名故以名為之貪首戒失時不能淡忘者曰懊惱貪一念為一過得時作得意想者曰自滿貪一念為一過未得有意求得者曰患得貪一念為二過未失恐其或失者曰患失貪一念為二過既失鬱結顧戀或生怨尤者曰有蔓貪言因一貪別生罪過蔓延不已最難掃除一念為五過既得欣幸希冀更生不足者曰無厭貪一念為五過已有不肯與人者曰慳貪一念為五過挾有傲人者曰驕貪一念為五過欣慕人有者曰愛貪一念為五過嫉妒人有者曰妒貪一念為十過因愛生求因妒生忮者曰惡貪一念為二十過一貪未息一貪又起者曰循環貪一念為十過不關境遇無端忽動可欲者曰夢想貪一念為五過貪利名稍清利已濁利較名當加一等懊惱貪者一念為二過自滿貪者免過有知足之心也患得貪者一念為五過患失貪者一念為五過有蔓貪者一念為十過無厭貪者一念為十過慳貪者一念為二過驕貪者一念為十過愛貪者一念為五過妬貪者一念為十二過惡貪者一念為五十過循環貪者一念為二十過夢想貪者一念為十過貪安逸不貪名利必貪安佚人情也過宜從輕懊惱貪者一念為一過自滿貪者免過安佚而自滿宜作功論但見為得意仍屬貪心患得貪者一念為二過患失貪者一念為二過有蔓貪者一念為五過無厭貪者一念為五過慳貪者一念為一過驕貪者一念為一過愛貪者一念為二過妬貪者一念為十過惡貪者一念為二十過循環貪者一念為十過夢想貪者一念為五過貪利養衣服飲食居處妻妾之類俱為利養貪及利養與勢力益鄙陋矣過宜從重懊惱貪者一念為二過自滿貪者一念為一過患得貪者一念為五過患失貪者一念為五過有蔓貪者一念為十過無厭貪者一念為十過慳貪者一念為二過驕貪者一念為十過愛貪者一念為五過妬貪者一念為二十過惡貪者一念為五十過循環貪者一念為二十過夢想貪者一念為十過貪勢力爵祿威權車馬僕御之類俱為力勢懊惱貪者一念為二過自滿貪者一念為二過患得貪者一念為五過患失貪者一念為五過有蔓貪者一念為十過無厭貪者一念為十過慳貪者一念為二過有勢力不肯分人可無肆橫之患但本原出于慳貪亦不得為無過驕貪者一念為十過愛貪者一念為五過妬貪者一念為二十過惡貪者一念為五十過循環貪者一念為二十過夢想貪者一念為十過功例忘名不見可欲曰渾忘常得此心為無量功漠然無所動于其中非德成者不能故功為無量亦見可欲而不動心者曰淡忘常守此心為二百功見可欲亦動心而能强制之者曰守忘一事為十功憶前期後欣戚紛擾中一念正見現前諸紛擾一時解釋者曰遣忘一事為五功可欲者當前一時不能强制又不能排遣另尋一瀟灑事以當之如十友五師之類曰遁忘一次為一功忘利渾忘者為無量功淡忘者為百五功守忘者一事為十功遣忘者一事為五功遁忘者一次為一功忘安佚渾忘者為五百功淡忘者為二百功守忘者一事為十功遣忘者一事為五功遁忘者一次為一功忘利養渾忘者為二百功淡忘者為百功守忘者一事為五功遣忘者一事為二功遁忘者一次為一功忘勢力渾忘者為百功淡忘者為五十功守忘者一事為二功遣忘者一事為二功遁忘者一事為一功九戒瞋心地平等念念慈悲人不見有賢愚境不見有順逆者謂之戒行圓成戒行圓成者得歡喜自在報得事事如意報得人天敬禮報得生不還天報若慈悲普愛證菩薩乘瞋人因公起瞋者曰公瞋一念為一過因私起瞋者曰私瞋一念為二過不見詞色者曰暗瞋一念為一過稍露詞色者曰現瞋一念為二過色笑如常胸中常有隱憾者曰鬱瞋暗瞋指一時一事言鬱瞋指久遠言一日為五過一接遇突生怒意者曰暴瞋一次為五過一瞋後怦怦不忘者曰長瞋一日為五過瞋而復喜喜而復瞋者曰亂瞋一次為五過瞋時遇可喜事不能化解者曰固瞋一事為十過本無可瞋無故怏怏不遂者曰業報瞋一日為十過凡犯此瞋者必有惡業將見惡報矣故曰業報瞋境過事移提起復瞋者曰藏瞋一次為十過瞋此人波及彼瞋彼人波及此者曰蔓瞋一事為二十過往往遣忘一時盡憶者曰决瞋若水之潰決者一事為二十過瞋積不休轉成毒恨者曰蛇蝎瞋一事為五十過怒氣突發不可控遏者曰豺虎瞋一次為五十過氣填胸臆幾不欲生者曰死瞋一次為五十過瞋事公瞋者一念為一過私瞋者一念為一過暗瞋者一念為一過現瞋者一次為二過鬱瞋者一日為五過暴瞋者一次為五過長瞋者一日為五過亂瞋者一次為五過固瞋者一事為十過業報瞋者一日為過十藏瞋者一次為十過蔓瞋者一事為二十過决瞋者一事為二十過蛇蝎瞋者一事為五十過豺虎瞋者一次為五十過死瞋者一次為五十過瞋境人事有可瞋之理境遇無可瞋之情過故獨重公瞋者一念為二過私瞋者一念為五過暗瞋者一念為五過現瞋者一次為五過鬱瞋者一日為十過暴瞋者一次為十過長瞋者一日為十過亂瞋者一次為十過固瞋者一車為二十過業報瞋者一日為二十過藏瞋者一次為二十過蔓瞋者一事為五十過決瞋者一事為五十過蛇蝎瞋者一事為百過豺虎瞋者一次為五十過死瞋者一次為五十過功例悲人於怦怦拂鬱之時一念正見現前思其無知作惡甚為可憫者曰求悲一念為一功不見可悲恆見可惡而强起悲憫之心者曰法悲悲乃治瞋之法故曰法悲一念為二功前用思維此則不用思維强之即是故功加倍亦見可惡轉而生悲者曰智悲一念為十功功夫稍熟故功從重不見可惡祗見可悲者曰大悲一念為百功一切憂天憫人之意無礙光風霽月之懷者曰體用全悲至此為無量功聖人德品菩薩深心何功可言悲事於怦怦拂鬱之時一念正見現前思善惡因緣不爽衆生迷妄見業難消者曰求悲一念為一功法悲者一念為二功智悲者一念為十功大悲者一念為百功體用全悲者為無量功悲境於怦怦拂鬱之時一念正見現前思苦樂無常轉眼即同空花漫無根緒世人迷謬妄為執著者曰求悲一念為一功法悲者一念為二功智悲者一念為十功大悲者一念為百功體用全悲者為無量功十戒癡心體如太虛孤月朗朗無翳者謂之戒行圓成戒行圓成者得人天敬禮直超色界歸法性土證菩薩乘癡憶不忘往事曰癡憶不窮理不達事過去悲愈戀戀於中者曰頑癡為百過窮理達事亦知戀憶之非而心地終搖搖不寧者曰習癡為五十過自咎妄憶之非而不能斷決者曰忍癡為二十過一時了悟意空轉眼復憶者曰復癡為十過癡執妄執當前為癡執不能窮理達事現前欣戚執滯不化者曰頑癡為百過亦能窮理達事而執見終不能化者曰習癡為五十過自咎其癡而不能斷決者曰忍癡為二十過一時了悟境空轉眼復執者曰復癡為十過癡逆妄意將來為癡逆不能窮理達事未來禍福預為料逆致心境搖搖者曰頑癡為百過亦能窮理達事而逆意未忘者曰習癡為五十過自咎其癡不能斷決心猶懸懸者曰忍癡為二十過一時了悟意止轉眼復逆者曰復癡為十過癡空有時憶往逆來有時執化空立者曰攪亂癡為百過念無起處昏沈欲睡者曰幽暗癡為二百過遊心廣漠漫無歸著者曰虛圓癡為五百過幽暗癡猶可藥虛圓癡最難醫宜著力破之功例了憶事過即忘不懷恩不念怨不戀順境不悲逆境者曰業了為百功隨境生心境過心空者曰意了為二百功無古無今無過去無現在一念總持不動不變者曰法了為五百功意中功德難以計數約略為格弗可拘泥了執貧富同觀貴賤平等夭夀不二者曰達了為百功順逆無常死生瞬息看人世之欣戚悲愈如流水如浮雲了不可執者曰能了為二百功即境安心隨分得己一切可著一切無著者曰真了為五百功了逆看一切因緣果報皆為妄作妄受不但惡因惡果為妄作妄受即善因善果亦為妄作妄受不可窮詰了無攀援者曰見了為百功無過去無未來一息可以千古萬劫不離一息者曰行了為二百功不見有往不見有來昭然獨覺者曰心了為五百功了空一念既空萬緣而一念曾未忘衆生為境不落空一念既空萬善而一念曾不捨慈悲為行不落空一念無始無終滅生滅相而一念實能應感一切無遺漏因為心不落空俱為不可言說不可言說難思議功
