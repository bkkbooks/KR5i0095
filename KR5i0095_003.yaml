body:
  text: 十戒功過格一名行核孚佑上帝純陽吕祖天師示定一戒殺念念慈愛在在生機為殺戒圓成殺戒圓成者得長夀報得多男報得富貴福享報得生天報若慈悲普護并能超越三界證菩薩乘深淺不同隨人自證殺微命一切生物之最蠢者曰微命惡其害人妨事而殺者曰憎殺如蚊蠅蚤虱之類一次為一過至百命外加一過千命作十過貪其滋味或利其毛骨而殺者曰愛殺如蝦螺為饌牡蠣為藥蚌珠為飾之類一次為二過至百命外加二過千命為二十過無心而殺者曰誤殺如焚野戽田水火誤傷之類至千命為一過牢養調弄曰戲殺如鬬蟋蟀拍蝴蝶之類一命為一過雖不傷命而調弄不放亦為一過見卑幼牢養調弄可禁止者不為禁止亦作一過以無慈心故也教人漁捕曰倡殺一次為十過置造殺器曰普殺一器為五十過乩訓曰凡漁獵屠膾終身之殺皆置造殺器之人所教也一人造殺器千人之殺皆因之故陰律獨重殺小命微有知者曰小命憎殺者如蛇虺害人獾兔害田之類一次為二過愛殺者家畜雞鵝野畜雉兔之類每一次為五過愛殺例比憎殺加一等一二五下三等也十二十五十中三等也百二百五百上三等也凡言加一等者依此祭祀邪鬼燕會奢靡者曰縱殺每一命為二過祟邪則傷正行奢靡則傷儉德故過獨重誤傷者一次為一過戲殺者如養八哥畫眉鬬鵪鶉之類一次為二過雖不傷命而調弄不放亦為一過見卑幼調弄可禁止者不為禁止亦作一過倡殺者一次為二十過普殺者一事為五十過微命普殺鼠藥鼠籠之類小命普殺網刀杖之類殺大命大有知者曰大命憎殺者虎狼之類已傷人者其罪宜死殺之反為功憎殺或因愛人起見者如孫叔敖埋蛇周孝侯斬蛟射虎之類俱可為功未傷人者殺之則為過以無死罪故必為過功與過俱以五為準貪其利而殺者為十過愛殺者家畜猪羊野畜獐鹿之類一命為十過為祀典戎政孝養殺者非過縱殺者一命為二十過誤殺者一命為五過戲殺者如弄猢猻之類一命為二十過雖不傷命而或開囿闢園繫猿養鹿者一事亦為十過卑幼有調弄者可禁不禁亦作五過倡殺者一次為五十過普殺者如打造鎗刀弓箭鳥銃等軍器一事為百過併可傷人過故特重業此者終身共為千過僅千過者與以改悔之路也奉官命制造者非過無故殺有功於世之畜曰忍殺如牛馬駝象之類無故者無祀典戎政等故也一命為五十過殺人命人命無憎殺愛殺諸條者以其顯背王章不通懺悔不得以過言故也醫術不精寒熱誤施攻補錯用致傷人命者亦曰誤殺一人為五十過非大寒大熱大攻大補之劑及無反背形跡者不作過論若貪其利而故為行險者為百過此貪謝儀而行險徼幸者與人爭名而故為行險者亦為百過此好為立異以求名者若他人調治不錯故說其錯妄為翻案致誤人者貪名貪利二俱有之為二百過溺一子女亦為忍殺此亦顯背王章不通懺悔者但世有生女不舉之風故復列此為五百過人命非輕天性更重本難以過計曰五百者律數止此也墮一胎為二百過傳人一墮胎方藥為百過殺類見殺生歡喜心者曰喜殺為己所憎之人物恆有是情微命一過小命二過大命五過人命十過見殺稱其便捷者曰贊殺微命一過小命二過大命五過人命十過見漁獵所獲稱其得利見寃對報復稱其快心者曰慶殺微命小命一過大命二過人命五過慶殺較喜殺贊殺減等者以其有愛人之心也見殺聞殺勢可救而不救者曰忘情殺微命小命為一過大命為二過人命為二十過若人命勢易救而不救者為五十過易救不救此命由我死矣食見殺聞殺特殺之肉者曰溺情殺俱一次為一過惟為君親所賜以及餕胙所食者非過好勇鬬狠者曰間殺言與殺止差一間也且間或有殺者一次為二十過人與我鬬狠不能忍者十過我與人鬬狠釁非人開者為五十過若欺其孤弱者為百過骨肉間為二百過悖理滅倫乃過之極重者鑿井穿渠拋棄一無主骸骨曰橫殺為二十過以禮改葬之免過以禮者謂盛以小襯祭以酒肴淩虐下人不恤其飢寒痛苦卒至傷生者曰殘殺一命為百過傳人一魘魅方藥曰試殺為五十過蠱毒魘魅王章列於十惡不赦之條本不當存此但世有好奇之人原無殺人之心或因方藥之奇而妄為傳述者過亦不少殺機前殺類猶可加以殺之名此殺機已盡泯乎殺之意但充類至義之盡亦無非一殺之機也故曰殺機無心纍人凍餓一時為一過有心者指戲侮者言為五過因憎其人而故為害彼者十過行路慌張或置器不正纍人傾跌顚危者為一過有心戲侮者為五過因憎其人而故為害彼者十過淩虐下人一次為五過下人有過可責也或以竹枝或以戒方或手受或股受小過以五下為準大過以十下為準此即尚書所謂撲作教刑也若責非其器具責非所受處責過於其數俱為凌虐不恤下人饑寒疾痛一次為一過飢寒必為保恤疾痛必為調治忍視者為過更責以勞役過加一等阻遏窮苦人營謀一次為十過此指營謀之不傷義犯刑者言若謀為非歹勸正之反作功論見人倡義作利濟事不竭力贊成為一過因爭名起見者為五過反阻撓之為十過因爭名起見者為五十過已成而毀敗之為五十過大事為百過因爭名起見者為二百過利濟之事如建立社倉開設義學修平道路葺造橋梁設立憩亭渡船疏通河道井泉糾集惜字放生施藥施棺施蚊帳棉襖涼茶薑湯煮賑育嬰養老施義冢施燈籠等會皆是凡遇老年之人殘疾之人生厭薄心者為一過見於辭色為二過甚者為五過悔而復然者為十過過難於悔既悔而復然過終不能改矣過當加一等諸條悉以此為例父母年老眼昏耳聾人子奉侍偶生憎厭之心者一次為十過念頭動處即是稍露辭色為二十過甚者為五十過父母有病不擇醫調治一日為五十過不謹慎湯藥委之下人一次為二十過不多方供奉甘旨一日為十過病時有不得輕進甘旨者非過昆弟夫婦有疾不慎擇醫一日為十過庸醫往往誤人有病者不可不愼擇愼擇之道必須自己知醫不恤父母筋力老年父母家事已謝者惟睡眠飲食而已或有操作皆人子之過也聽其操作一事為五過末世澆風并有役使父母者實難以過論此真地獄之種子也家庭間有嫌怨弟兄妯娌之間難保必無嫌怨但以一誠為感格要亦不難消釋不急為消釋者小事以三日為準大事以十日為準一事為十過甚至骨肉乖離者為百過一有小嫌即為解釋何至乖離苟或不知解釋漸積漸深勢必至於乖離矣久淹親柩者一歲為五十過此指經營別務絶不經心者言因貧不能成禮而久淹者一歲為十過喪禮稱家有無不宜久待故亦為過若惑於風水而久淹者一歲為二十過若因兄弟爭論財費而久淹者一歲為百過貧賤故舊親戚厭其往來一念為一過待之不以禮一事為五過即非親族故舊但生憎厭亦為一過妬人所有以敗為歡一念為二過生一幸災樂禍心者為五過若因私怨生心者為十過凡惡人得現報正當觸目警心反躬自省或哀之憫之方為正覺若一生幸災樂禍之意便有害於人心為過已不小矣况或出於私怨者也遇鰥寡孤獨之人一切交關不存忠恕寬厚之心為一過或反欺侮之為十過甚者為五十過破人婚姻未成者為十過已成者為五十過此指方結親時說或以門戶不對貧富不等而一言打破者夫妻欲離異為之主謀者五百過不與其謀而凂作離書順情應之者為百過敗人苗稼田畔有高下之分水道有蓄泄之利同畔不仁恆多暗損至於合塘分水强者占利皆為敗人苗稼若乃撒稗揠苗實非人情不在過例一次為十過禳災不修善行反許牲牢惡願為十過設一機械陰謀坑陷人者小事為十過大事為五十過極大事為百過小事陷人失利大事陷人失名極大事陷人於獄訟有是心而事未及行者減二等減二等謂小事二過大事十過極大事二十過也習學拳棒𠒋器為十過狼籍字紙五穀為不恤生人之本一次為一過至千字千粒外者加過嗜碁一日為二過古語云善畫者多夀為其觸筆皆生機也善奕者多夭為其動念即殺機也抑且費時失業故列為過功例救微命觸境生憐方便釋放者曰哀救一次為一功此見其困苦實生憐憫之心者故功獨重至百命外加功凡云一次一功者雖一命亦作一功凡云百命外加功者核命數計功則以百命為一功千命為十功萬命為百功過亦倣此例作意放生勞力營救者曰力救一次為一功百命外加功出錢買放者曰破財救自百命至千命為一功千命外加功出錢買放富貴易為且心與力俱輕功宜減等所費照三十文為一功例另記後俱倣此鑿池開囿廣勸放生者曰法救倡義者為百功利非一時功能溥及故功最大所費總照三十文一功例另記救小物命哀救者一次為一功一命亦為一功力救者一次為一功一命亦為一功破財救者一次為一功費以三十文為一功法救者一事為百功有費照前例因放生致缺孝養親心不當反為二過親心悅功可加一等救大物命救大物命必生哀憫之心又必費力且必費財故不分三等救一傷人之物曰過情救虎狼之類為二功費依前例救一無害於人之物曰大慈救羊豕獐鹿之類為十功救一有功於世之物曰報德救牛馬之類為五十功設法禁止屠殺牛犬或勸化屠獵等人改業曰普護救為百功空言無裨者亦作一功救人命精於醫術救一危症作五十功重症作二十功大症作十功輕症作五功小症作二功極小極輕症如瘡癤疥癬之類亦作一功惟受謝者非功功或浮於所謝仍可補記假如救一危症應得五十功以三十文為一功算應受謝錢一千五百文謝不及數餘功自當補記力救一被焚被溺者為五十功有費另記哀救一無依子女設法收養得長成為二百功使之終身得所為五百功即不長成亦為百功阻人溺子墮胎一命為二十功見有負寃受獄者苦心戮力出之俾死刑得生重罪得減均為五十功絶殺類見殺不能救生哀憫心者曰心救一次為一功微命為二功微命功反多者以其難起哀心故也見殺不能救口稱可憐冀人解釋者曰口救一次為一功見殺聞殺特殺之肉不忍食一次為一功見人好勇鬬狠力為勸救一次為二功人有與我鬬狠者閉戶避之為十功葬一無主骸骨為二十功有費另記倡義作利濟事大事百功如建義倉設義學施棺施蚊帳綿襖煮賑等事小事五十功如造橋平路建立茶亭渡船等事細瑣事二十功如糾惜字放生施凉茶施姜湯施燈籠等會之類若有力者議建常平社倉普利天下育嬰育老功垂後世俱作五百功凡有費皆照例另記妾媵生育主母撫之時時與已出者比較每一念為一功事事不致軒輊每一事為一功為絶分親知絶後者立繼并教養之一人為二百功至成立為五百功不毀傷巢卵雛麛一次為一功見人有毀傷者勸止之亦為一功魚子不經鹽三年猶可活凡人食魚捨子均可為功杜殺機飢人與之一餐凍人與之一衣費宜另記扶持一顚危人指引一迷路人無歸者留之一宿俱為一功寬恕下人過犯矜恤下人飢寒疾痛俱一次為一功見人倡義作利濟事極力贊成為十功不費財力口稱揚之亦作一功見人流落無依不忍為丐乞者為之謀一安身處為五十功凡人忍為丐乞者雖有安身處亦不能久異鄉人流落不得歸助之盤費三千文為一功倡義為之凑集盤費為十功善解一仇為十功仇深者為五十功父母生死之仇不在此例事父母服勞奉養先意承志每致親心喜悅一次為一功父母有勞動處善為勸止親安而悅者一次為一功兄弟間任勞推逸一事為一功勸人弗事刀筆一次為一功見從永戒為二十功勸人弗離婚為一功能委曲周旋之為五十功有費另記勸人弗暴殄天物為一功暴殄飢歉之因也以此勸人功亦最大勸人放生一人見從為十功矜恤鰥寡孤獨之人一次為五功有費另記凡言矜恤者必起哀憐心或酒食惠施或盤飱遺餽皆是即空言慰撫亦可為功但應減等矜恤貧苦親戚故舊一次為五功有費另記下同矜恤遇災禍者一次為五功矜恤老年殘疾之人一次為二功奸惡之人陰謀害人乘間勸止一事為十功俗學迂儒必以擇交立論一切奸惡之人避之如仇而不知具大智慧得大慈悲有大機權者正當深入此輩之室而為之轉移若係有權力者更宜留心結契轉變有法常得一言而利及天下可徒高一己之名而概以奸惡絶之耶害大者功宜加等成全一困苦人營謀小事一功大事十功小事指一時之利言如稱貸貨賣之類大事指久遠之利言如技術經營之類二戒盜事事光明正大念念舍己利人謂之戒行圓成戒行圓成者得大富報得人盡力報得所願必成報得為天神報若慈悲普捨證菩薩乘盜財劫奪穿窬者顯犯王章不通懺悔不在過欺隱人財物人必生疑者曰明盜一次為一過三十文外加過雖一文亦為破戒亦當記過大約過有輕重以三十文為準非謂不滿三十文即非過也記法自一文至三十文俱為一過自三十一文至六十文俱為二過自六十一文至九十文俱為三過也後俱倣此欺隱人財物而人不生疑者曰暗盜一次為二過二十文外加一過欺隱人財物恐人生疑而因賈罪於人者曰誣盜一次為五過十文外加一過乘急苛取恃强轄取者曰挾威盜一次為五過至十文外加過背衆私取恃智巧取者曰挾詐盜一次為二過二十文外加過取窘迫人所有或患難人所遺者曰絶命盜一文為一過盜且兼殺過得不重乎受人寄託代人買賣於中欺隱者曰典守盜一次為二過二十文外加過欺隱家長眷屬之物以及官府公物者曰滅倫盜十文為一過盜名名為天地所忌且人之愛名更甚於愛財盜戒宜嚴竊人之才能以為己有如文章技藝非己所有攘竊成名者明盜一次為一過暗盜一次為二過事之大者如功名中己得名即纍人失名過加三等竊人之善以為己有者如公善倡義自人冒稱倡義自己者私善人本自出至誠冒稱勸之自我者明盜一次為二過暗盜一次為五過竊人之惠以為己有者恩惠出之自人冒稱出之自己小事二過大事五過人終不得白己或受其報者為十過竊人之功以為己有者如醫藥謀望中多有小事五過大事十過人不得白己享其利者為二十過凡報恩報怨假公濟私者小事五過大事十過妄執邪見倡為異教惑衆取利者曰邪盜倡者五百過從者百過天主大成青衣白衣等類皆是盜命盜竊之中恆有性命所關者雖念不及此而過自重謀人産業奪人生理者一事為五十過若係暗盜陰險特甚應作百過甚者二百過致人失業困苦為五百過盜人祕密訣法致人失業者小事十過大事二十過己享其利者為百過賣僮婢貪重利致不得所者曰坑陷盜一人為五十過誘人嫖賭於中取利者曰極惡盜一次為百過以春方邪藥售人者曰蠱盜一次為五十過以採戰邪術惑人求利者曰妖盜一次為百過盜充無盜之跡有盜之心或無盜之心類盜之跡者皆名之曰盜充使用輕重戥稱大小升斗者曰市行盜一次為一過攛掇卑幼盜廢家長財物者曰教盜一事為五過喜人奢靡或攛掇人奢費者曰耗盜一事為一過乞假用物遺誤他處以致無還者曰懈盜一事為一過無心誤取人用物如夾帶之類曰誤盜纍人尋覔或致失事者一次為一過為人用財過於寬厚借人財物以邀結自己聲名者一次為五過立意為人求名者免過如馮歡為孟嘗焚劵之類不當者一過勸人淫祀以及祈禳者一次為二十過勸人捨財非實落功德徒市一已聲名者如建鬼神祠宇之類百錢為一過以上三條俱曰偏盜偏執一己之見故曰偏盜規避差徭曰罔上盜一次為二過博奕賭勝曰戲盜一次為二過前條殺戒中所列是指不賭勝者說故過輕此指賭勝者則名為博奕實則賭具矣故過特重攙和五穀曰明欺盜一次為一過酒冲水布刮漿等類俱可例推用意探人隱微曰鬼伺盜一事為二過倡義為無益事擾纍地方者曰妄盜如高檯扮戲賽神行會之類一次為五十過更有私心於中取利者為百過縱六畜食踐他人五穀墳塋者曰傷本盜五穀為生人之本墳塋亦為水源木本故曰傷本盜一次為五過不義中更兼不仁過自不輕買賣交易貪取便宜曰小見盜一次為一過誤得假銀復用於人者曰償失盜三十文為一過教人燒煉鉛汞曰欺天盜一次為百過見燒煉丹書不急焚毀曰遺害盜一書為十過名雖燒煉其實用銅為之者必遭天譴然世人為貪心所使見是書而惑志者多故必燒盡以絶後患盜原好奢好懶盜之原也正本清源多在勤儉飲食嫌惡薄衣服嫌朴陋居室嫌湫隘器用嫌粗惡俱以一念為一過飲食必求肥甘衣服必求鮮麗居室必求塏爽器用必求精良俱一念為二過此未見於事為飲食嫌惡薄求肥甘費十文為一過衣服嫌朴陋求華麗費百文為一過居室嫌湫隘求塏爽費千文為一過器用嫌粗惡求精良費百錢為一過無力强費者加一等因之違要負約者加二等有食於人嫌其淡薄不成禮者一念為一過縱飲叨飱曰狗盜俱一次為二過縱飲至醉叨飱至傷為五過乩訓曰酒之為禍殺盜淫三業皆因之蓋酒能亂性暴發貪嗔貪合於財則為盜之原貪合於色則為淫之媒嗔生於暴則為殺之機欲戒三惡必先戒酒即不能絶亦務在節之毋為所困可也廢業遊閒一日為一過日中無故睡眠為一過賓客燕會崇尚奢靡一次為二過甚者為五過若以奢靡驕人者為十過凡便飯過四簋宴會過八簋一席而山珍海錯無不備者皆為奢靡縱婦女置金珠艷飾一事為五過所費以三十文為一過小兒衣紬帛一事為五過非惟習奢抑且減福故宜重戒縱婦女入廟燒香通僧尼往來者曰陰怪盜一次為五過置造戲具簫笙紙牌之類小事為十過大事為五十過於一切吉凶之禮作無益之費均以三十文為一過托節儉之說於父母四事供養不盡其誠一事為十過甚者為五十過四事供養謂飲食衣服湯藥卧具也為人師者授藝不能盡心一日為一過一切得人心力錢而不實心為人辦事者同論虛稱奉教修功不辦實心克治者曰侮法盜一日為一過功例捨財愛其人而捨者曰喜捨如敬老慈幼愛有德有能之土因而有所餽遺者一次為一功三十文外加功若趨炎附勢貪名利或喜結納者非功憐其人而捨者曰悲捨如施乞丐救飢寒之類一次為一功三十文外加功借以邀世譽者非功人受其惠已無所損者曰自然捨如為人愛惜財物及拾遺還人之類每次為一功值百錢外加功費心費力而不受謝者曰力捨如醫家送方力士效力或為人謀事為人息爭等類每一事為一功有成效者小事二功大事十功為人賠墊以成其事應補以息人爭而事過無償不露聲色者曰暗捨一事為五功因之自矜者減一等十文外加功意有所為者非功設法廣募澤可遠布者曰法捨每一事為五十功大事為百功極大事為二百功貪名者功減二等損資刋刻善書曰教捨費三十文為二功見人有急理可取而不取曰慈捨三十文為二功意有所為者非功捨名己有才能為人盜竊不求表白者曰忘能捨一事為一功人有為我表白者謙不受曰讓能捨一事為五功己有善行為人盜竊不求表白者曰忘善捨一事為二功人有為我表白者謙不受曰讓善捨一事為十功己有恩惠及人為人攘奪不求表白者日忘恩捨一事為五功人有為我表白者謙不受曰讓恩捨一事為二十功善大而惠小讓恩之功較之讓善更多者以人之情往往捨大而不能捨小也人有盜行賈禍於我者甘受不白曰容濁捨一事為二十功無端受人謗毀反己自責自修不求暴白曰增進捨一事為十功捨命産業生理一切資生之事人有與我爭奪者讓之不較是非不怨窮困曰安命捨一事為五十功此指以命自慰者言若以大悲心忘我窮困喜人得利者為二百功若見得一切無常絶不關心者為五百功忍飢而飯人忍寒而衣人傾囊而濟人曰忘命捨一事為百功小事如一飯之德亦作十功惟有為者非功如慕色之類不避艱難捐軀救人曰全身捨一事為百功事非君親尚宜酌量或為天下利害起見方可為此大事五百功絶盜充戥稱斗斛出入公平若肯吃小虧曰無形捨一次為一功值十文外加功勸人節儉曰口舌捨一次為一功乞假人用物為人細心愛護如期送還及借人書籍為之修釘破損改注訛字俱為一功不避差徭不逋稅課俱一次為一功交易借貸不違要約必如期為一功租債出入稍存寬厚一事為一功三十文外加功交易買賣貨真價實不攙和不虛誑一日為一功倡義禁止作為無益擾纍地方等事一事為二十功如禁止高檯演戲賽神行會元夜鬧燈五日競渡等事若因爭名起見或因私忿起見者非功焚燬一壞人心術書為一功如燒煉方書房術之類斥逐一强梁童僕為十功別有所為者非功誤得假銀即棄不用值三十文為一功謹守盜戒一草一葉不與不取一次為一功如不告主人攀折花枝之類謹盜原飮食不嫌惡薄衣服不嫌朴陋居室不嫌湫隘器用不嫌粗惡俱一念為一功此為初學言之也亦自見為惡薄朴陋湫隘粗惡而强忍之故以為功若至德成并不見為惡薄朴陋湫隘粗惡矣又從何處記功總之功過全在天理人欲交戰處定案人欲勝則為過天理勝則為功全盡天理功過二字俱可不立餘悉倣此飲食衣服居室器用力堪華膴而甘心淡泊節以施人存是心者一念為二功有食於人或遇於淡薄不成禮心反慕樂喜其節儉者一次為一功飲不求醉飯不求飽思天下飢者渴者虛己節省家食外食皆同一次為一功終日勤敏不致虛縻廩粟一日為一功士農工商各盡其業便是一念之貪皇皇求利者非功革一奢靡俗習為十功並能化及他人為二十功釀成風俗為二百功勸一人勤儉作家為二十功即不聽從亦作一功以勤儉教家子弟謹率家規一月不亂可作一功終歲不亂可作十功習於寬厚樂善喜施功亦準此一切吉凶之禮不事虛文如婚禮鼓樂彩轎燈棚之類喪禮紙俑綵亭以及喪車飾以綵帛之類生子三朝彌月朞歲廣作湯餅之會之類事難枚舉全在達者敦本抑末轉移風俗當思不止為一身計方妙敦崇儉朴一事為十功三戒淫接遇惟禮忘男女相謂之戒行圓成戒行圓成者得功名顯達報眷屬貞良報超越欲界得生十八梵天報若慈悲普護證菩薩乘淫婦有關名分者為根本重罪犯之不通懺悔必墮地獄不在過例恃財恃勢誘劫成淫情愛實輕者曰暴淫一人為五百過僕婦為二百過情好纏綿死生不解者曰癡淫一人為二百過僕婦為百過本非有意境地偶逢彼此動情不克自持者曰寃業淫一人為百過僕婦為五十過既犯淫戒復對人言者曰宣淫一次為五十過此於本等淫業罪過外加録意有所求邪緣未集妄稱有私者曰妄淫一事為五十過自妄邪淫實非情理然今世少年以惡為能者往往有此故列以為戒淫孀女暴淫一孀婦閨女為千過惡不可逭難以計數曰千過者約辭也亦見其惡之出格而已必受三途之報又何功之可折除哉婢女為五百過癡淫一孀婦閨女為五百過婢女為二百過冤業淫一孀婦閨女為二百過婢女為百過為孀婦閨女宣淫一次為百過妄淫者加一等孀婦之名節獨重妄淫之罪亦獨重淫僧尼僧尼者為破佛律儀亦名根本重罪恐世不解故復列此暴淫一僧尼為無量過必受地獄